<section class="barren-game" aria-label="Empty page mini game">
  <p class="barren-line" data-en="You have arrived in a barren place" data-zh="你来到了一片荒芜的地方">你来到了一片荒芜的地方</p>
  <canvas class="barren-canvas" width="720" height="260"></canvas>
  <div class="barren-hud">
    <span><span data-en="Papers" data-zh="论文">Papers</span> <strong class="barren-score">0</strong></span>
    <span><span data-en="Time" data-zh="时间">Time</span> <strong class="barren-time">60</strong>s</span>
  </div>
  <div class="barren-actions">
    <button class="barren-restart" type="button" data-en="Restart" data-zh="重新开始">Restart</button>
    <span class="barren-status" data-en="Grab as many papers as you can before time runs out." data-zh="趁时间还没到，多捡几篇论文。">Grab as many papers as you can before time runs out.</span>
  </div>
  <ol class="barren-board" aria-label="Local leaderboard"></ol>
  <p class="barren-tip" data-en="Move with left/right or A/D. Jump with up, W, space, or a tap." data-zh="左右方向键或 A/D 移动；上方向键、W、空格，或者点一下游戏区域都能跳。">Move with left/right or A/D. Jump with up, W, space, or a tap.</p>
</section>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    document.querySelectorAll('.barren-game').forEach(function (game) {
      var canvas = game.querySelector('.barren-canvas');
      var scoreNode = game.querySelector('.barren-score');
      var timeNode = game.querySelector('.barren-time');
      var statusNode = game.querySelector('.barren-status');
      var boardNode = game.querySelector('.barren-board');
      var restartNode = game.querySelector('.barren-restart');
      var ctx = canvas.getContext('2d');
      var keys = {};
      var storageKey = 'barren-game-leaderboard';
      var duration = 60;
      var score = 0;
      var timeLeft = duration;
      var startedAt = Date.now();
      var finished = false;
      var lang = localStorage.getItem('site-language') || 'en';
      var player = { x: 48, y: 198, w: 22, h: 30, vy: 0, grounded: true };
      var papers = [
        { x: 160, y: 158, w: 24, h: 30, hit: false },
        { x: 315, y: 118, w: 24, h: 30, hit: false },
        { x: 512, y: 166, w: 24, h: 30, hit: false }
      ];
      var popups = [];

      function t(en, zh) {
        return lang === 'zh' ? zh : en;
      }

      function readBoard() {
        try {
          return JSON.parse(localStorage.getItem(storageKey)) || [];
        } catch (error) {
          return [];
        }
      }

      function writeBoard(board) {
        localStorage.setItem(storageKey, JSON.stringify(board.slice(0, 5)));
      }

      function renderBoard() {
        var board = readBoard();
        boardNode.innerHTML = '';
        if (board.length === 0) {
          var empty = document.createElement('li');
          empty.textContent = t('No runs yet', '暂无记录');
          boardNode.appendChild(empty);
          return;
        }
        board.forEach(function (entry) {
          var item = document.createElement('li');
          item.textContent = entry.score + t(' papers · ', ' 篇论文 · ') + entry.date;
          boardNode.appendChild(item);
        });
      }

      function saveScore() {
        var board = readBoard();
        board.push({
          score: score,
          date: new Date().toLocaleDateString()
        });
        board.sort(function (a, b) { return b.score - a.score; });
        writeBoard(board);
        renderBoard();
      }

      function resize() {
        var rect = canvas.getBoundingClientRect();
        canvas.width = Math.max(320, Math.floor(rect.width));
        canvas.height = 260;
      }

      function resetPapers() {
        papers.forEach(function (paper, index) {
          paper.x = 120 + index * Math.max(120, canvas.width / 4);
          paper.y = 112 + (index % 2) * 52;
          paper.hit = false;
        });
      }

      function resetGame() {
        score = 0;
        timeLeft = duration;
        startedAt = Date.now();
        finished = false;
        popups = [];
        player.x = 48;
        player.y = 198;
        player.vy = 0;
        player.grounded = true;
        scoreNode.textContent = score;
        timeNode.textContent = timeLeft;
        statusNode.textContent = t('Grab as many papers as you can before time runs out.', '趁时间还没到，多捡几篇论文。');
        resetPapers();
      }

      function drawPaperIcon(paper) {
        var x = paper.x;
        var y = paper.y;
        ctx.save();
        ctx.translate(x, y);
        ctx.fillStyle = '#ffffff';
        ctx.strokeStyle = '#2563eb';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(paper.w - 7, 0);
        ctx.lineTo(paper.w, 7);
        ctx.lineTo(paper.w, paper.h);
        ctx.lineTo(0, paper.h);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#dbeafe';
        ctx.beginPath();
        ctx.moveTo(paper.w - 7, 0);
        ctx.lineTo(paper.w - 7, 7);
        ctx.lineTo(paper.w, 7);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#93c5fd';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(5, 11);
        ctx.lineTo(paper.w - 5, 11);
        ctx.moveTo(5, 17);
        ctx.lineTo(paper.w - 4, 17);
        ctx.moveTo(5, 23);
        ctx.lineTo(paper.w - 8, 23);
        ctx.stroke();
        ctx.restore();
      }

      function updateTimer() {
        var elapsed = Math.floor((Date.now() - startedAt) / 1000);
        var nextTime = Math.max(0, duration - elapsed);
        if (nextTime !== timeLeft) {
          timeLeft = nextTime;
          timeNode.textContent = timeLeft;
        }
        if (timeLeft === 0 && !finished) {
          finished = true;
          statusNode.textContent = t('Time is up. Saved to the local board.', '时间到！这局已经记到本地排行榜了。');
          saveScore();
        }
      }

      function updatePopups() {
        popups.forEach(function (popup) {
          popup.y -= 0.8;
          popup.life -= 1;
        });
        popups = popups.filter(function (popup) { return popup.life > 0; });
      }

      function update() {
        updateTimer();
        updatePopups();
        if (finished) return;

        if (keys.ArrowLeft || keys.a) player.x -= 3.2;
        if (keys.ArrowRight || keys.d) player.x += 3.2;
        player.x = Math.max(8, Math.min(canvas.width - player.w - 8, player.x));

        player.vy += 0.55;
        player.y += player.vy;
        if (player.y >= 198) {
          player.y = 198;
          player.vy = 0;
          player.grounded = true;
        }

        papers.forEach(function (paper) {
          if (paper.hit) return;
          var closeX = player.x < paper.x + paper.w && player.x + player.w > paper.x;
          var closeY = player.y < paper.y + paper.h && player.y + player.h > paper.y;
          if (closeX && closeY) {
            paper.hit = true;
            score += 1;
            scoreNode.textContent = score;
            popups.push({ x: paper.x + paper.w / 2, y: paper.y - 4, life: 55 });
          }
        });

        if (papers.every(function (paper) { return paper.hit; })) {
          resetPapers();
        }
      }

      function drawBackground() {
        ctx.fillStyle = '#f8fafc';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#dbeafe';
        for (var i = 0; i < 8; i += 1) {
          ctx.fillRect(i * 120 - 20, 214 - (i % 3) * 10, 78, 16);
        }
        ctx.fillStyle = '#94a3b8';
        ctx.fillRect(0, 230, canvas.width, 4);
      }

      function drawPlayer() {
        ctx.fillStyle = finished ? '#64748b' : '#2563eb';
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.fillStyle = '#e0f2fe';
        ctx.fillRect(player.x + 5, player.y + 7, 4, 4);
        ctx.fillRect(player.x + 14, player.y + 7, 4, 4);
      }

      function drawPopups() {
        ctx.save();
        ctx.font = '700 16px system-ui, sans-serif';
        ctx.textAlign = 'center';
        popups.forEach(function (popup) {
          ctx.globalAlpha = Math.min(1, popup.life / 25);
          ctx.fillStyle = '#be123c';
          ctx.fillText(t('Paper +1', '论文+1'), popup.x, popup.y);
        });
        ctx.restore();
      }

      function drawOverlay() {
        if (!finished) return;
        ctx.fillStyle = 'rgba(15, 23, 42, 0.72)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffffff';
        ctx.font = '700 24px system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(t('Time up', '时间到'), canvas.width / 2, 112);
        ctx.font = '16px system-ui, sans-serif';
        ctx.fillText(t('Score: ', '得分：') + score + t(' papers', ' 篇论文'), canvas.width / 2, 142);
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBackground();
        papers.forEach(function (paper) {
          if (!paper.hit) drawPaperIcon(paper);
        });
        drawPlayer();
        drawPopups();
        drawOverlay();
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      function jump() {
        if (!finished && player.grounded) {
          player.vy = -10;
          player.grounded = false;
        }
      }

      window.addEventListener('keydown', function (event) {
        keys[event.key] = true;
        if (event.key === 'ArrowUp' || event.key === 'w' || event.key === ' ') jump();
      });
      window.addEventListener('keyup', function (event) {
        keys[event.key] = false;
      });
      window.addEventListener('site-language-change', function (event) {
        lang = event.detail.lang;
        renderBoard();
        if (!finished) {
          statusNode.textContent = t('Grab as many papers as you can before time runs out.', '趁时间还没到，多捡几篇论文。');
        }
      });
      canvas.addEventListener('pointerdown', jump);
      restartNode.addEventListener('click', resetGame);
      window.addEventListener('resize', function () {
        resize();
        resetPapers();
      });

      resize();
      renderBoard();
      resetGame();
      loop();
    });
  });
</script>
